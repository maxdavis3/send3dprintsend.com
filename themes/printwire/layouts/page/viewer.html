{{ define "head-extra" }}
<style>
  #viewer-page {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 70px);
    background: var(--bg-dark);
  }
  #drop-zone {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 24px;
    border: 2px dashed var(--border);
    border-radius: 16px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    user-select: none;
    background: var(--bg-section);
  }
  #drop-zone:hover, #drop-zone.dragover {
    border-color: var(--primary);
    background: var(--bg-card);
  }
  .drop-icon { font-size: 56px; margin-bottom: 16px; pointer-events: none; }
  .drop-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; pointer-events: none; color: #fff; }
  .drop-sub { font-size: 14px; color: #777; margin-bottom: 24px; pointer-events: none; }
  .format-badges { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; pointer-events: none; }
  .format-badge {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.05em;
  }
  .btn-browse {
    margin-top: 28px;
    background: var(--primary);
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-browse:hover { background: var(--primary-dark); }
  #file-input { display: none; }
  #viewer-canvas {
    flex: 1;
    position: relative;
    display: none;
    overflow: hidden;
  }
  #viewer-canvas canvas { display: block; width: 100% !important; height: 100% !important; }
  #viewer-filename {
    position: absolute;
    top: 12px; left: 16px;
    font-size: 13px; color: #555;
    font-weight: 600; pointer-events: none;
  }
  .viewer-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: linear-gradient(transparent, rgba(0,0,0,0.85));
  }
  .controls-hint { font-size: 12px; color: #555; }
  .btn-new-model {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: #aaa;
    font-family: inherit;
    font-size: 13px;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .btn-new-model:hover { background: var(--bg-card-hover); color: #fff; }
  .loading-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.75);
    gap: 14px; font-size: 16px; color: var(--primary);
  }
  .progress-bar { width: 220px; height: 3px; background: var(--bg-card); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.2s; }
</style>
{{ end }}

{{ define "main" }}
<div id="viewer-page">

  <div id="drop-zone">
    <div class="drop-icon">📦</div>
    <div class="drop-title">Drop your 3D file here</div>
    <div class="drop-sub">or click to browse — nothing is uploaded to a server</div>
    <div class="format-badges">
      <span class="format-badge">GLB</span>
      <span class="format-badge">GLTF</span>
      <span class="format-badge">STL</span>
      <span class="format-badge">OBJ</span>
    </div>
    <button class="btn-browse" id="btn-browse">Choose File</button>
    <input type="file" id="file-input" accept=".glb,.gltf,.stl,.obj">
  </div>

  <div id="viewer-canvas">
    <div id="viewer-filename"></div>
    <div class="loading-overlay" id="loading-overlay">
      <div id="loading-text">Loading model…</div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>
    <div class="viewer-bar">
      <span class="controls-hint">🖱️ Drag to rotate · Scroll to zoom · Right-click to pan</span>
      <button class="btn-new-model" id="btn-new">Load New Model</button>
    </div>
  </div>

</div>
{{ end }}

{{ define "scripts" }}
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { STLLoader } from 'three/addons/loaders/STLLoader.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

const dropZone     = document.getElementById('drop-zone');
const fileInput    = document.getElementById('file-input');
const canvasEl     = document.getElementById('viewer-canvas');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingText  = document.getElementById('loading-text');
const progressFill = document.getElementById('progress-fill');
const filenameEl   = document.getElementById('viewer-filename');

// Read site's bg color from CSS variable for scene background
const bgColor = getComputedStyle(document.documentElement).getPropertyValue('--bg-dark').trim() || '#0a0a0f';
const primaryColor = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim() || '#00d4ff';

const scene = new THREE.Scene();
scene.background = new THREE.Color(bgColor);
scene.fog = new THREE.Fog(bgColor, 20, 80);

const camera = new THREE.PerspectiveCamera(50, 1, 0.001, 2000);
camera.position.set(4, 2.5, 4);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.4;
renderer.outputColorSpace = THREE.SRGBColorSpace;
canvasEl.appendChild(renderer.domElement);

const pmremGenerator = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;
pmremGenerator.dispose();

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.5;
controls.minDistance = 0.01;
controls.maxDistance = 1000;

scene.add(new THREE.AmbientLight(0xffffff, 1.5));
const dir1 = new THREE.DirectionalLight(0xffffff, 3.0);
dir1.position.set(5, 10, 5);
scene.add(dir1);
const dir2 = new THREE.DirectionalLight(0xffffff, 2.0);
dir2.position.set(-5, 5, -5);
scene.add(dir2);
const p1 = new THREE.PointLight(new THREE.Color(primaryColor), 2, 100);
p1.position.set(-3, 2, 0);
scene.add(p1);
const p2 = new THREE.PointLight(0x7b2ff7, 2, 100);
p2.position.set(3, -1, 2);
scene.add(p2);
scene.add(new THREE.GridHelper(40, 80, 0x222244, 0x111122));

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);
const stlLoader = new STLLoader();
const objLoader = new OBJLoader();

const defaultMat = new THREE.MeshStandardMaterial({
  color: new THREE.Color(primaryColor).lerp(new THREE.Color(0xffffff), 0.4),
  roughness: 0.35, metalness: 0.7, side: THREE.DoubleSide,
});

let currentModel = null;

function clearModel() {
  if (currentModel) { scene.remove(currentModel); currentModel = null; }
}

function fitToScene(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const scale = 2.5 / maxDim;
  object.position.copy(center).multiplyScalar(-scale);
  object.scale.setScalar(scale);
  camera.position.set(4, 2.5, 4);
  controls.target.set(0, 0, 0);
  controls.update();
}

function fixGLTFMaterials(object) {
  object.traverse((child) => {
    if (!child.isMesh) return;
    const mats = Array.isArray(child.material) ? child.material : [child.material];
    mats.forEach((mat, i) => {
      if (mat.isMeshBasicMaterial) {
        const r = new THREE.MeshStandardMaterial({ color: mat.color, map: mat.map, roughness: 0.5, metalness: 0.1, side: THREE.DoubleSide });
        if (Array.isArray(child.material)) child.material[i] = r; else child.material = r;
      } else {
        mat.side = THREE.DoubleSide;
        if (mat.envMapIntensity !== undefined) mat.envMapIntensity = 2.0;
        mat.needsUpdate = true;
      }
    });
  });
}

function addToScene(object) {
  clearModel();
  fitToScene(object);
  scene.add(object);
  currentModel = object;
  loadingOverlay.style.display = 'none';
}

function onProgress(xhr) {
  if (xhr.total) {
    const pct = Math.round(xhr.loaded / xhr.total * 100);
    loadingText.textContent = `Loading… ${pct}%`;
    progressFill.style.width = pct + '%';
  }
}

function onError(err) {
  loadingText.textContent = 'Error loading file.';
  console.error(err);
}

function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['glb','gltf','stl','obj'].includes(ext)) { alert(`Unsupported format ".${ext}"`); return; }
  const url = URL.createObjectURL(file);
  dropZone.style.display = 'none';
  canvasEl.style.display = 'block';
  filenameEl.textContent = file.name;
  loadingOverlay.style.display = 'flex';
  loadingText.textContent = 'Loading model…';
  progressFill.style.width = '0%';
  resizeRenderer();

  if (ext === 'glb' || ext === 'gltf') {
    gltfLoader.load(url, (gltf) => { fixGLTFMaterials(gltf.scene); addToScene(gltf.scene); URL.revokeObjectURL(url); }, onProgress, onError);
  } else if (ext === 'stl') {
    stlLoader.load(url, (geo) => { geo.computeVertexNormals(); const m = new THREE.Mesh(geo, defaultMat.clone()); const g = new THREE.Group(); g.add(m); addToScene(g); URL.revokeObjectURL(url); }, onProgress, onError);
  } else if (ext === 'obj') {
    objLoader.load(url, (object) => { object.traverse(c => { if (c.isMesh) c.material = defaultMat.clone(); }); addToScene(object); URL.revokeObjectURL(url); }, onProgress, onError);
  }
}

document.getElementById('btn-browse').addEventListener('click', e => { e.stopPropagation(); fileInput.click(); });
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0]); });
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
document.getElementById('btn-new').addEventListener('click', () => { clearModel(); canvasEl.style.display = 'none'; dropZone.style.display = 'flex'; fileInput.value = ''; });

function resizeRenderer() {
  const w = canvasEl.clientWidth, h = canvasEl.clientHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resizeRenderer);

function animate() {
  requestAnimationFrame(animate);
  p1.intensity = 2 + Math.sin(Date.now() * 0.002) * 0.5;
  p2.intensity = 2 + Math.cos(Date.now() * 0.002) * 0.5;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
{{ end }}
